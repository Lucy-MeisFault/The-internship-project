<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Průzkum spokojenosti</title>
<link rel="stylesheet" href="style.css">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
</head>
<body>
<div class="screen">
  <div class="logo">Průzkum spokojenosti</div>

  <div class="drop-zone" id="dropZone">
    <span class="label">Drop your Excel file here</span>
    <span class="sub">or <span class="browse" id="browseBtn">browse files</span></span>
    <span class="formats">.xlsx · .xls · .csv</span>
    <input type="file" id="fileInput" accept=".xlsx,.xls,.csv" style="display:none">
  </div>

  <div class="file-chosen" id="fileChosen">
    <span class="fname" id="fileName"></span>
    <span class="clear" id="clearFile">remove</span>
  </div>
  <button class="btn-primary" id="generateBtn">Generate report ↗</button>
</div>

<script src="script.js">

</script>
</body>
</html>
